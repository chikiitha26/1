<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Events Gallery</title>
<style>
    table{
        margin: auto;
        border: 2px solid black;
    }
    .event-img{
        color: rgb(34, 105, 185);
    }
</style>
   
</head>

<body>

    <h2 style="text-align:center;">
        Community Events Gallery
    </h2>

    <table>

        <tr>

            <td>
                <img src="event1.jpg"
                     alt="Sports Event"
                     title="Sports Event"
                     class="event-img">

                <p>Annual Sports Meet</p>
            </td>

            <td>
                <img src="event2.jpg"
                     alt="Cultural Event"
                     title="Cultural Event"
                     class="event-img">

                <p>Cultural Festival</p>
            </td>

            <td>
                <img src="event3.jpg"
                     alt="Tree Plantation"
                     title="Tree Plantation"
                     class="event-img">

                <p>Tree Plantation Drive</p>
            </td>

        </tr>

        <tr>

            <td>
                <img src="event4.jpg"
                     alt="Music Program"
                     title="Music Program"
                     class="event-img">

                <p>Music Night</p>
            </td>

            <td>
                <img src="event5.jpg"
                     alt="Food Festival"
                     title="Food Festival"
                     class="event-img">

                <p>Food Festival</p>
            </td>

            <td>
                <img src="event6.jpg"
                     alt="Community Meeting"
                     title="Community Meeting"
                     class="event-img">

                <p>Community Meeting</p>
            </td>

        </tr>

    </table>

</body>
</html>
